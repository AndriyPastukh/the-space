services:
  db:
    image: postgres:15-alpine
    container_name: thespace_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-thespace}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thespace_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/thespace}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000

  frontend:
    build:
      context: ./frontend
    container_name: thespace_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - PORT=${PORT:-5173}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
