name: Check successful compose project

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Збірка (використовує базовий compose файл)
      - name: Start Docker Compose
        run: docker compose -f docker-compose.yml up -d --build

      # Перевірка Бекенду
      - name: Check /status endpoint
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:3000/status; then
              echo "Status endpoint OK"
              exit 0
            fi
            echo "Waiting for /status..."
            sleep 3
          done
          echo "Status endpoint failed"
          exit 1

      # Перевірка Фронтенду
      - name: Check frontend is accessible
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:5173; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 3
          done
          echo "Frontend failed"
          exit 1

      - name: Check containers status
        run: docker ps

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml down
